<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5a4bd1;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="40" fill="url(#lg)"/>
  <!-- Ledger Book -->
  <rect x="35" y="30" width="122" height="132" rx="8" fill="white" opacity="0.95"/>
  <rect x="35" y="30" width="16" height="132" rx="4" fill="#ddd"/>
  <!-- Spine dots -->
  <circle cx="43" cy="55" r="3" fill="#999"/>
  <circle cx="43" cy="96" r="3" fill="#999"/>
  <circle cx="43" cy="137" r="3" fill="#999"/>
  <!-- Header line -->
  <rect x="60" y="44" width="85" height="4" rx="2" fill="#6c5ce7"/>
  <!-- Table lines -->
  <line x1="60" y1="62" x2="145" y2="62" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="60" y1="78" x2="145" y2="78" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="60" y1="94" x2="145" y2="94" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="60" y1="110" x2="145" y2="110" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="60" y1="126" x2="145" y2="126" stroke="#e0e0e0" stroke-width="1"/>
  <!-- Data rows -->
  <rect x="62" y="65" width="30" height="3" rx="1" fill="#999"/>
  <rect x="120" y="65" width="22" height="3" rx="1" fill="#28a745"/>
  <rect x="62" y="81" width="40" height="3" rx="1" fill="#999"/>
  <rect x="120" y="81" width="18" height="3" rx="1" fill="#dc3545"/>
  <rect x="62" y="97" width="25" height="3" rx="1" fill="#999"/>
  <rect x="120" y="97" width="22" height="3" rx="1" fill="#28a745"/>
  <rect x="62" y="113" width="35" height="3" rx="1" fill="#999"/>
  <rect x="120" y="113" width="20" height="3" rx="1" fill="#28a745"/>
  <!-- Total -->
  <rect x="60" y="135" width="85" height="16" rx="3" fill="#6c5ce7" opacity="0.15"/>
  <rect x="62" y="140" width="28" height="4" rx="1" fill="#6c5ce7"/>
  <rect x="118" y="140" width="24" height="4" rx="1" fill="#6c5ce7"/>
</svg>
